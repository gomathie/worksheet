# Ledger — Cloudflare Pages project (static Vue build + Pages Functions API)
name = "ledger"
compatibility_date = "2026-07-01"
pages_build_output_dir = "dist"

[vars]
TEAM_TZ = "Africa/Accra"

# Production bindings.
# After `wrangler d1 create ledger-db` and `wrangler kv namespace create SESSIONS`,
# paste the generated ids below (see README "Deploy").
[[d1_databases]]
binding = "DB"
database_name = "ledger-db"
database_id = "76d95171-eb36-446a-9853-e022547397ea"

[[kv_namespaces]]
binding = "SESSIONS"
id = "7d711a1014234ceca37d94c4ccec91da"

# Preview environment (Pages preview deployments) gets its own database,
# created with `wrangler d1 create ledger-db-preview`.
[env.preview]

[env.preview.vars]
TEAM_TZ = "Africa/Accra"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "ledger-db-preview"
database_id = "f4f9ca94-f418-47f4-a191-457c8f7e03bf"

[[env.preview.kv_namespaces]]
binding = "SESSIONS"
id = "684d82e9405f411ab027ec4338d27c34"
